<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notium</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link rel="icon" href="./images/logo.png">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <nav id="navbar">
        <div class="nav-container">
            <a href="./index.html" class="logo">
                <div class="logo-icon"><img src="./images/logo.png" class="logo-icon" alt="Logó"></div>
                <div class="logo-text">Notium</div>
            </a>
            <ul class="nav-links">
                <li><a href="./bejelentkezes.html" class="cta-primary">Bejelentkezés</a></li>
                <li><a href="./regisztracio.html" class="cta-secondary">Regisztráció</a></li>
            </ul>
            <div class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div class="mobile-nav" id="mobileNav">
            <ul>
                <li><a href="">Bejelentkezés</a></li>
                <li><a href="" class="reg">Regisztráció</a></li>
            </ul>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-bg-animation">
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>
            <div class="floating-shape shape-3"></div>
            <div class="geo-shape geo-1"></div>
            <div class="geo-shape geo-2"></div>
            <div class="particles">
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
            </div>
        </div>
        <div class="hero-content">
            <h1>Bejelentkezés</h1>
            <label for="email1">Email cím:</label>
            <input type="text" name="emai1" class="inpt" id="loginEmail" placeholder="valami@gmail.com" />
            <label for="passwd1">jelszó:</label>
            <div class="inpt-wrap">
                <input type="password" name="passwd1" id="loginPassword" class="inpt" />
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
            </div>
            <div class="cta-buttons">
                <button id="loginButton" class="cta-primary">Bejelentkezés</button>
            </div>
            <p class="error" id="loginError"></p>
            <a class="cta-secondary asd">Regisztráció</a>
            <div id="userInfo" style="display: none;">
                <p>Logged in as: <span id="displayEmail"></span> (<span id="displayUsername"></span>)</p>
                <button id="signOutButton">Sign Out</button>
                <button id="deleteAccountButton">Delete My Account</button>
                <p class="error" id="deleteError"></p>
                <div id="reauthenticateSection" style="display: none;">
                    <p>Please re-enter your password to confirm account deletion:</p>

                    
                    <div class="inpt-wrap">
                        <input type="password" id="reauthPassword" placeholder="Your Password">
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('reauthPassword', this)"></i>
                    </div>

                    <button id="confirmReauthButton">Confirm Deletion</button>
                </div>
            </div>
        </div>
        <p id="status"></p>
    </section>

    <script src="adatkezeles.js"></script>
</body>

</html>
